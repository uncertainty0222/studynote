<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영수증 가계부</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🧾 영수증 가계부</h1>
    <p class="subtitle">영수증 사진을 던지면 자동으로 정리해드려요</p>
  </header>

  <main>
    <!-- Upload Zone -->
    <section class="upload-section">
      <div id="drop-zone" class="drop-zone">
        <div class="drop-icon">📸</div>
        <p class="drop-text">영수증 사진을 여기에 끌어다 놓거나<br><strong>클릭해서 선택</strong>하세요</p>
        <p class="drop-hint">여러 장을 한 번에 올려도 됩니다 · JPG, PNG, WEBP</p>
        <input type="file" id="file-input" accept="image/*" multiple hidden />
      </div>

      <div id="upload-queue" class="upload-queue hidden"></div>

      <button id="process-btn" class="btn-primary hidden">
        <span class="btn-icon">⚡</span> 분석 시작
      </button>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Summary Cards -->
    <section id="summary-section" class="summary-section hidden">
      <h2>이번 달 요약</h2>
      <div id="summary-cards" class="summary-cards"></div>
    </section>

    <!-- Expense Table -->
    <section id="expense-section" class="expense-section hidden">
      <div class="expense-header">
        <h2>지출 내역</h2>
        <div class="filters">
          <select id="filter-month">
            <option value="">전체 기간</option>
          </select>
          <select id="filter-category">
            <option value="">전체 카테고리</option>
            <option>식비</option>
            <option>카페/음료</option>
            <option>교통</option>
            <option>쇼핑</option>
            <option>생활용품</option>
            <option>의료/건강</option>
            <option>문화/여가</option>
            <option>기타</option>
          </select>
        </div>
      </div>
      <div id="expense-list" class="expense-list"></div>
    </section>
  </main>

  <!-- Receipt Detail Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <button class="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
